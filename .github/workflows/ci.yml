# Continuous integration: install deps, typecheck, lint, and test on every
# PR and on pushes to main. This is independent of publish.yml, which only
# builds and ships the container image.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint and format check
        run: bun run check

      - name: Test
        run: bun test --concurrency=1 tests/
