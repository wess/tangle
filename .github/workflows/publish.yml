# Builds the Tangle image and publishes it to GitHub Container Registry
# (ghcr.io/wess/tangle) and, optionally, Docker Hub (docker.io/wess/tangle).
#
# Release is package.json-driven:
#   - push to main bumps package.json version  -> publishes <version> + latest + sha-<short>
#   - push to main without a version bump      -> no-op (publish job is skipped)
#   - manual dispatch                          -> always publishes the current version
#
# GHCR auth uses the built-in GITHUB_TOKEN; no secret needed.
#
# Docker Hub mirroring is optional. Set both secrets to enable it:
#   DOCKERHUB_USERNAME  -- Docker Hub account name (wess)
#   DOCKERHUB_TOKEN     -- Docker Hub access token with Read & Write scope
# When DOCKERHUB_TOKEN is unset every Docker Hub step is skipped and
# the workflow publishes to GHCR only.
name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required by actions/attest-build-provenance to mint the OIDC token
  # that signs the attestation. Without it the attest step 403s.
  id-token: write
  attestations: write

# A second push to the same ref shouldn't race the first. We don't
# cancel-in-progress: a release publish must always finish, even if a
# follow-up main push lands while it's building.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gatekeeper. Reads package.json, compares its `version` against the
  # previous commit's, and decides whether the publish job runs. Manual
  # dispatch always passes through so the operator can force a re-publish
  # without a fake version bump.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD~1 to diff package.json; depth=2 is the minimum.
          fetch-depth: 2
      - id: check
        env:
          EVENT: ${{ github.event_name }}
        run: |
          CUR=$(jq -r .version package.json)
          if [ -z "$CUR" ] || [ "$CUR" = "null" ]; then
            echo "::error::package.json has no version field"
            exit 1
          fi
          echo "version=$CUR" >> "$GITHUB_OUTPUT"
          PREV=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual dispatch — publishing $CUR regardless of version delta"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "$CUR" != "$PREV" ]; then
            echo "Version bumped: ${PREV:-<none>} -> $CUR"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged at $CUR — skipping publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: version-check
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # Surfaced as an env so every Docker-Hub-touching step can gate on the
    # same condition. Secrets can't be referenced from job-level `if`s, so
    # we evaluate the gate once here and reuse it.
    env:
      PUBLISH_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
      VERSION: ${{ needs.version-check.outputs.version }}
    steps:
      # libs/atlas is a git submodule the Dockerfile COPYs into the build
      # context — bun install resolves @atlas/* from libs/atlas/packages/*.
      # Without submodules:recursive the image build fails.
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # metadata-action's `images:` list is computed here so docker.io
      # only joins the publish set when Docker Hub creds are configured.
      - name: Compute image refs
        id: images
        env:
          REPO: ${{ github.repository }}
        run: |
          {
            echo "list<<EOF"
            echo "ghcr.io/$REPO"
            if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
              echo "docker.io/$REPO"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          # We compute `latest` ourselves below; disable metadata-action's
          # built-in inference (which would otherwise add it on every push).
          flavor: latest=false
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # mode=max records every build step in the provenance, not just
          # the final layer. Slightly larger but worth it for auditability.
          provenance: mode=max
          sbom: true

      # GitHub-native build provenance, separate from the in-image
      # provenance baked in by buildx above. One attestation per registry
      # since the image lives at two refs (same digest in both).
      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub image
        if: env.PUBLISH_DOCKERHUB == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Mirrors README.md to the Docker Hub repo page. Non-fatal: a
      # description sync failure must not fail an otherwise-good publish.
      - name: Sync Docker Hub description
        if: env.PUBLISH_DOCKERHUB == 'true' && github.event_name == 'push'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ github.repository }}
          readme-filepath: ./README.md
          short-description: "Self-hosted git server — issues, PRs, releases, webhooks, MCP. Bun + React + Postgres."
